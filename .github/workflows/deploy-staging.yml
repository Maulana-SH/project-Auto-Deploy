name: Deploy to Staging

on:
     push:
          branches:
               - staging

jobs:
     deploy:
          runs-on: self-hosted

          steps:
               - name: Checkout kode
                 uses: actions/checkout@v4

               - name: Build Release
                 run: |
                      & "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe" "SKK.sln" /p:Configuration=Release /p:Platform="Any CPU"

               - name: Copy ke Staging
                 run: |
                      xcopy /E /Y /I "SKK\bin\Release\*" "D:\Citrix\Staging\SKKRNDAPPS\"

               - name: Selesai
                 run: echo "Deploy ke Staging berhasil"
