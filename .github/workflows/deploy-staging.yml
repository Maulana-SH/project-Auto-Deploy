name: 🚀 Deploy to Staging

on:
     push:
          branches:
               - staging

jobs:
     build-and-deploy:
          name: Build & Deploy → Staging
          runs-on: self-hosted

          steps:
               - name: ✅ Checkout code
                 uses: actions/checkout@v4

               - name: 🔧 Setup MSBuild
                 uses: microsoft/setup-msbuild@v2

               - name: 📦 Restore NuGet packages
                 shell: powershell
                 run: |
                      nuget restore "SKK.sln"
                 working-directory: "SKK"

               - name: 🏗️ Build Release
                 shell: powershell
                 run: |
                      msbuild "SKK.sln" `
                        /p:Configuration=Release `
                        /p:Platform="Any CPU" `
                        /t:Rebuild `
                        /m `
                        /v:minimal
                 working-directory: "SKK"

               - name: 🔍 Verifikasi hasil build
                 shell: powershell
                 run: |
                      $buildOutput = "SKK\SKK\bin\Release"
                      if (Test-Path $buildOutput) {
                        $files = Get-ChildItem $buildOutput | Measure-Object
                        Write-Host "✅ Build output ditemukan: $($files.Count) file(s)"
                      } else {
                        Write-Host "❌ Folder build tidak ditemukan: $buildOutput"
                        exit 1
                      }

               - name: 📁 Deploy ke Staging
                 shell: powershell
                 run: |
                      $source      = "SKK\SKK\bin\Release"
                      $destination = "D:\Citrix\Staging\SKKRNDAPPS"

                      Write-Host "📂 Source      : $source"
                      Write-Host "📂 Destination : $destination"
                      Write-Host "⏳ Deploying..."

                      robocopy $source $destination /MIR /NP /NDL /LOG:deploy-staging.log

                      # robocopy exit code 0-7 = sukses, 8+ = error
                      if ($LASTEXITCODE -le 7) {
                        Write-Host "✅ Deploy Staging BERHASIL!"
                        exit 0
                      } else {
                        Write-Host "❌ Deploy Staging GAGAL! Exit code: $LASTEXITCODE"
                        Get-Content deploy-staging.log
                        exit 1
                      }

               - name: 📋 Upload Deploy Log
                 if: always()
                 uses: actions/upload-artifact@v4
                 with:
                      name: staging-deploy-log-${{ github.run_number }}
                      path: deploy-staging.log
                      retention-days: 7
