name: Deploy to Staging

on:
     push:
          branches:
               - staging

jobs:
     deploy:
          runs-on: self-hosted

          steps:
               - name: Checkout kode
                 uses: actions/checkout@v4

               - name: Setup MSBuild
                 uses: microsoft/setup-msbuild@v2

               - name: Build Release
                 run: |
                      msbuild "SKK.sln" /p:Configuration=Release /p:Platform="Any CPU"

               - name: Copy ke Staging
                 run: |
                      xcopy /E /Y /I "SKK\bin\Release\*" "D:\Citrix\Staging\SKKRNDAPPS\"

               - name: Selesai
                 run: echo "Deploy ke Staging berhasil"
