name: Deploy to Production

on:
     pull_request:
          branches:
               - main
          types:
               - closed

jobs:
     build:
          name: 🏗️ Build
          runs-on: self-hosted

          # Hanya jalan kalau PR di-MERGE (bukan sekedar ditutup)
          if: github.event.pull_request.merged == true

          steps:
               - name: ✅ Checkout code
                 uses: actions/checkout@v4

               - name: 🔧 Setup MSBuild
                 uses: microsoft/setup-msbuild@v2

               - name: 📦 Restore NuGet packages
                 shell: powershell
                 run: nuget restore "SKK.sln"
                 working-directory: "SKK"

               - name: 🏗️ Build Release
                 shell: powershell
                 run: |
                      msbuild "SKK.sln" `
                        /p:Configuration=Release `
                        /p:Platform="Any CPU" `
                        /t:Rebuild `
                        /m `
                        /v:minimal `
                        /p:SignManifests=false `
                        /p:SignAssembly=false `
                        /p:GenerateManifests=false
                 working-directory: "SKK"

               - name: 🔍 Verifikasi hasil build
                 shell: powershell
                 run: |
                      $buildOutput = "SKK\bin\Release"
                      if (Test-Path $buildOutput) {
                        $files = Get-ChildItem $buildOutput | Measure-Object
                        Write-Host "Build output ditemukan: $($files.Count) file(s)"
                      } else {
                        Write-Host "Folder build tidak ditemukan: $buildOutput"
                        exit 1
                      }

               - name: 📤 Upload build artifact
                 uses: actions/upload-artifact@v4
                 with:
                      name: production-build-${{ github.run_number }}
                      path: SKK\bin\Release
                      retention-days: 1

     deploy:
          name: 📁 Deploy → Production
          runs-on: self-hosted
          needs: build

          steps:
               - name: 📥 Download build artifact
                 uses: actions/download-artifact@v4
                 with:
                      name: production-build-${{ github.run_number }}
                      path: SKK\bin\Release

               - name: 📁 Deploy ke Production
                 shell: powershell
                 env:
                      SHARE_USER: ${{ secrets.SHAREB_USERNAME }}
                      SHARE_PASS: ${{ secrets.SHAREB_PASSWORD }}
                 run: |
                      $source      = "SKK\bin\Release"
                      $shareRoot   = "\\172.25.0.2\App"
                      $destination = "$shareRoot\Production\SKKRNDAPPS"

                      Write-Host "Source      : $source"
                      Write-Host "Destination : $destination"
                      Write-Host "PR          : ${{ github.event.pull_request.title }}"
                      Write-Host "Merged by   : ${{ github.event.pull_request.merged_by.login }}"

                      Write-Host "Connecting ke share..."
                      $ErrorActionPreference = "SilentlyContinue"
                      net use $shareRoot /delete /y 2>&1 | Out-Null
                      $ErrorActionPreference = "Stop"
                      net use $shareRoot $env:SHARE_PASS /user:$env:SHARE_USER
                      if ($LASTEXITCODE -ne 0) {
                        Write-Host "Gagal konek ke share $shareRoot"
                        exit 1
                      }

                      Write-Host "Deploying..."
                      robocopy $source $destination /MIR /NP /NDL /R:3 /W:5 /LOG:deploy-production.log
                      $robocopyExit = $LASTEXITCODE

                      $ErrorActionPreference = "SilentlyContinue"
                      net use $shareRoot /delete /y 2>&1 | Out-Null
                      $ErrorActionPreference = "Stop"

                      if ($robocopyExit -le 7) {
                        Write-Host "Deploy Production BERHASIL!"
                        exit 0
                      } else {
                        Write-Host "Deploy Production GAGAL! Exit code: $robocopyExit"
                        Get-Content deploy-production.log
                        exit 1
                      }

               - name: 📋 Upload Deploy Log
                 if: always()
                 uses: actions/upload-artifact@v4
                 with:
                      name: production-deploy-log-${{ github.run_number }}
                      path: deploy-production.log
                      retention-days: 30
